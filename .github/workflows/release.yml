name: Build and Release

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun i

      - name: Build
        run: bun run build

      - name: Zip release
        run: cd dist; zip -r ../teldrive-ui.zip *

      - name: Release
        uses: softprops/action-gh-release@v2.2.2
        with:
          tag_name: latest
          files: teldrive-ui.zip

  notify-bdrive:
    needs: release
    runs-on: self-hosted
    if: success() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Trigger bdrive backend rebuild
        run: |
          curl --fail -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.BDRIVE_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/BenjiThatFoxGuy/bdrive/dispatches \
            -d '{"event_type":"ui-published","client_payload":{"repo":"${{ github.repository }}","sha":"${{ github.sha }}"}}'
