name: Sync with upstream

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/upstream-sync.yml'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-upstream:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/tgdrive/teldrive-ui.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Create sync branch
        id: create-branch
        run: |
          BRANCH_NAME="upstream-sync-$(date +%Y-%m-%d-%H%M%S)"
          git checkout -b "$BRANCH_NAME" upstream/main

          # GitHub blocks pushes that add/modify files under .github/workflows unless special
          # permissions are granted. Archive upstream workflows, then restore the fork's workflows.
          ARCHIVE_BASE=".github/workflows-archive/upstream"
          mkdir -p "$ARCHIVE_BASE"

          # Preserve full path under the archive directory.
          # Example: .github/workflows/foo.yml -> .github/workflows-archive/upstream/.github/workflows/foo.yml
          cp --parents -r .github/workflows "$ARCHIVE_BASE" 2>/dev/null || true

          # Keep the fork's workflows as-is.
          git checkout origin/main -- .github/workflows || true

          git add -A .github/workflows-archive .github/workflows || true
          git diff --cached --quiet || git commit -m "Archive upstream workflows and restore fork workflows"

          git push origin "$BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Create pull request
        uses: actions/github-script@v7
        with:
          script: |
            const { repo: { owner, repo } } = context;
            const branch = '${{ steps.create-branch.outputs.branch_name }}';
            const title = 'Sync with upstream';
            const body = 'This PR syncs the repository with upstream (tgdrive/teldrive-ui).\n\nPlease review and merge to update the fork with the latest changes from upstream.\n\nConflicts, if any, are included and need to be resolved manually.';
            const pr = await github.rest.pulls.create({
              owner,
              repo,
              title,
              body,
              head: branch,
              base: 'main'
            });
            console.log(`Created PR #${pr.data.number}: ${pr.data.html_url}`);
